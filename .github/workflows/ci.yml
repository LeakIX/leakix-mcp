name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check formatting
        run: make check-format

      - name: Lint
        run: make lint

      - name: Check trailing whitespace
        run: make check-trailing-whitespace

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type check
        run: make typecheck

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: make test

  changelog-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changelog commits
        run: |
          set -euo pipefail
          for commit in $(git log --format=%H origin/${{ github.base_ref }}..HEAD); do
              files=$(git diff-tree --no-commit-id --name-only -r "$commit")
              if echo "$files" | grep -q "^CHANGELOG.md$"; then
                  file_count=$(echo "$files" | wc -l | tr -d ' ')
                  if [ "$file_count" -gt 1 ]; then
                      echo "Error: Commit $commit modifies CHANGELOG.md with other files"
                      echo "CHANGELOG.md changes must be in their own dedicated commit"
                      exit 1
                  fi
              fi
          done
          echo "Changelog check passed"
